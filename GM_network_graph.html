C4", "target": "GMC11", "description": "Empress Helena found the cross and nails belonging to Jesus Christ.", "type": "translation"}, {"source": "GMC11", "target": "GMC13", "description": "Helena is the mother of Emperor Constantine.", "type": "family/ecclesiastical"}, {"source": "GMC12", "target": "GMC14", "description": "Agnes served as the first abbess for Queen Radegund\u2019s convent.", "type": "family/ecclesiastical"}, {"source": "GMC1", "target": "GMC12", "description": "Gregory visited Radegund, where they witnessed a lamp miraculously overflow.", "type": "miracle"}, {"source": "GMC16", "target": "GMC19", "description": "Tigris prayed at the tomb of John the Baptist for three years to receive a relic.", "type": "miracle"}, {"source": "GMC17", "target": "GMC18", "description": "The Bishop of Bazas and Priest Peter collaborated during the miracle of the crystal drops.", "type": "miracle"}, {"source": "GMC21", "target": "GMC22", "description": "The Archdeacon attempted to steal a relic against the warnings of Bishop Rufus.", "type": "miracle"}, {"source": "GMC1", "target": "GMC24", "description": "Deacon Johannes provided Gregory with eye-witness accounts of eastern miracles.", "type": "translation"}, {"source": "GMC29", "target": "GMC30", "description": "Basileus reported his vision of a \"naked\" Christ to the Bishop of Narbonne.", "type": "miracle"}, {"source": "GMC33", "target": "GMC34", "description": "The Apostle James was buried in a tomb he built for Zacharias and Simeon.", "type": "translation"}, {"source": "GMC6", "target": "GMC3", "description": "Peter and Paul are linked as the primary apostles and bishops of Rome.", "type": "family/ecclesiastical"}, {"source": "GMC37", "target": "GMC38", "description": "A Man from Tours entered a fire to save the relics of St. Andrew.", "type": "miracle"}, {"source": "GMC44", "target": "GMC32", "description": "Bishop Felix of Bourges witnessed the power of St. Stephen's relics against a perjurer.", "type": "miracle"}, {"source": "GMC49", "target": "GMC48", "description": "Abbot Aredius used the relics of Clement to restore a dried-up spring.", "type": "miracle"}, {"source": "GMC50", "target": "GMC51", "description": "Chrysanthus and Daria were martyred together and share a burial crypt.", "type": "family/ecclesiastical"}, {"source": "GMC52", "target": "GMC50", "description": "Pope Damasus enclosed the tomb of Chrysanthus with his own verses.", "type": "translation"}, {"source": "GMC56", "target": "GMC55", "description": "The poet Fortunatus recorded the miracles of St. Laurentius in verse.", "type": "translation"}, {"source": "GMC60", "target": "GMC58", "description": "Bishop Namatius imported the relics of Agricola from Bologna.", "type": "translation"}, {"source": "GMC62", "target": "GMC61", "description": "Apollinaris was freed from exile after praying at the tomb of St. Victor.", "type": "miracle"}, {"source": "GMC66", "target": "GMC64", "description": "Bishop Ambrose discovered the hidden bodies of Gervasius and Protasius.", "type": "miracle"}, {"source": "GMC67", "target": "GMC64", "description": "Bishop Martin of Tours received blood relics of Gervasius and Protasius.", "type": "translation"}, {"source": "GMC68", "target": "GMC67", "description": "Paulinus of Nola corresponded with Martin regarding the Milanese relics.", "type": "translation"}, {"source": "GMC70", "target": "GMC71", "description": "Nazarius and Celsus were martyred together at Embrun.", "type": "family/ecclesiastical"}, {"source": "GMC62", "target": "GMC108", "description": "Alcima is the sister of Bishop Apollinaris.", "type": "family/ecclesiastical"}, {"source": "GMC62", "target": "GMC109", "description": "Placidina is the wife of Bishop Apollinaris.", "type": "family/ecclesiastical"}, {"source": "GMC80", "target": "GMC78", "description": "Bishop Irenaeus succeeded Photinus as the bishop of Lyon.", "type": "family/ecclesiastical"}, {"source": "GMC80", "target": "GMC81", "description": "Epipodius was buried next to Bishop Irenaeus in a Lyon crypt.", "type": "translation"}, {"source": "GMC84", "target": "GMC83", "description": "Bishop Gregorius built a church for St. Benignus after a direct revelation.", "type": "miracle"}, {"source": "GMC84", "target": "GMC85", "description": "The spirit of Paschasia appeared to encourage the builders of Bishop Gregorius.", "type": "miracle"}, {"source": "GMC126", "target": "GMC87", "description": "Bishop Gallus was the uncle of Gregory and relative of Armentaria.", "type": "family/ecclesiastical"}, {"source": "GMC97", "target": "GMC96", "description": "Bishop Palladius enshrined the newly discovered relics of Eutropis.", "type": "translation"}, {"source": "GMC99", "target": "GMC98", "description": "Bishop Eugenius chose to be buried in the crypt of St. Amarandus.", "type": "translation"}, {"source": "GMC100", "target": "GMC102", "description": "The spirits of Rogatianus and Bishop Similinus joined to save Nantes.", "type": "miracle"}, {"source": "GMC104", "target": "GMC105", "description": "Bishop Eberigisilus found the body of Mallosus via a deacon's vision.", "type": "miracle"}, {"source": "GMC110", "target": "GMC112", "description": "Bishop Avitus dedicated a church for St. Genesius of Clermont.", "type": "translation"}, {"source": "GMC76", "target": "GMC77", "description": "King Sigismund performed penance at the tomb of St. Mauricius.", "type": "miracle"}, {"source": "GMC118", "target": "GMC77", "description": "King Guntramn requested relics of Mauricius for his own protection.", "type": "translation"}, {"source": "GMC121", "target": "GMC37", "description": "Bishop Leo of Agde defended cathedral property holding relics of St. Andrew.", "type": "translation"}, {"source": "GMC123", "target": "GMC124", "description": "Pope Pelagius II granted Roman relics to Gregory\u2019s Deacon Agiulf.", "type": "translation"}, {"source": "GMC1", "target": "GMC127", "description": "Gregory and his mother witnessed a miracle at the festival of St. Polycarp.", "type": "miracle"}, {"source": "GMC128", "target": "GMC129", "description": "The priest Eparchius was the son of Bishop Ruricius.", "type": "family/ecclesiastical"}, {"source": "GMC144", "target": "GMC143", "description": "Juliana gilded the church of Polyeuctus to hide her wealth from the emperor.", "type": "family/ecclesiastical"}, {"source": "GMC145", "target": "GMC146", "description": "Felix saved the aged Bishop Maximus from starvation during a persecution.", "type": "miracle"}, {"source": "GMC145", "target": "GMC147", "description": "Quintus became bishop after St. Felix declined the position.", "type": "family/ecclesiastical"}, {"source": "GMC149", "target": "GMC4", "description": "Priest Pannichius invoked the cross of Jesus Christ to dispel a demonic fly.", "type": "miracle"}]};

const categoryColors = {
  'Divine': '#f0d060',
  'Apostle': '#e07040',
  'Martyr': '#d94050',
  'Bishop/Pope': '#5090d0',
  'Clergy': '#50b8a0',
  'Royalty': '#a070d0',
  'Holy Figure': '#c0a060',
  'Layperson': '#708090',
  'Other': '#666'
};

const connectionColors = {
  'family/ecclesiastical': '#e8c050',
  'miracle': '#e06060',
  'translation': '#50a8d0'
};

const W = window.innerWidth;
const H = window.innerHeight;

const svg = d3.select('#graph')
  .attr('width', W)
  .attr('height', H);

const defs = svg.append('defs');
// Glow filter for connected nodes
const filter = defs.append('filter').attr('id', 'glow');
filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
const merge = filter.append('feMerge');
merge.append('feMergeNode').attr('in', 'blur');
merge.append('feMergeNode').attr('in', 'SourceGraphic');

const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.1, 5])
  .on('zoom', (e) => g.attr('transform', e.transform));

svg.call(zoom);

window.zoomIn = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
window.zoomOut = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
window.resetView = () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(0.45).translate(-W/2, -H/2));

const nodeById = {};
graphData.nodes.forEach(n => { nodeById[n.id] = n; });

const links = graphData.edges.map(e => ({
  source: e.source,
  target: e.target,
  description: e.description,
  type: e.type
}));

// Count connections per node for sizing
const connCount = {};
graphData.edges.forEach(e => {
  connCount[e.source] = (connCount[e.source] || 0) + 1;
  connCount[e.target] = (connCount[e.target] || 0) + 1;
});

const getRadius = d => {
  const c = connCount[d.id] || 0;
  return Math.max(5, 4 + c * 2);
};

// Initialize positions randomly around center
graphData.nodes.forEach(n => {
  const angle = Math.random() * Math.PI * 2;
  const r = 100 + Math.random() * 300;
  n.x = W / 2 + Math.cos(angle) * r;
  n.y = H / 2 + Math.sin(angle) * r;
});

// Force simulation — pure force-directed, no location grouping
const simulation = d3.forceSimulation(graphData.nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(100).strength(0.5))
  .force('charge', d3.forceManyBody().strength(-80))
  .force('center', d3.forceCenter(W / 2, H / 2))
  .force('collision', d3.forceCollide().radius(d => getRadius(d) + 10))
  .force('radial', d3.forceRadial(d => {
    // Connected nodes stay closer to center, isolated nodes drift out
    const c = connCount[d.id] || 0;
    return c > 0 ? 200 : 500;
  }, W / 2, H / 2).strength(0.03))
  .alphaDecay(0.012)
  .velocityDecay(0.3);

// Draw links
const linkG = g.append('g');
const linkEls = linkG.selectAll('line')
  .data(links)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', d => connectionColors[d.type] || '#555')
  .attr('stroke-width', 2.5);

// Draw nodes
const nodeG = g.append('g');
const nodeGroups = nodeG.selectAll('g')
  .data(graphData.nodes)
  .join('g')
  .attr('class', 'node-group');

// Saint outer ring
nodeGroups.filter(d => d.isSaint === 'Yes')
  .append('circle')
  .attr('class', 'saint-ring')
  .attr('r', d => getRadius(d) + 4)
  .attr('fill', 'none')
  .attr('stroke', d => categoryColors[d.category] || '#666')
  .attr('stroke-width', 0.8)
  .attr('opacity', 0.3);

// Main circle
nodeGroups.append('circle')
  .attr('class', 'node-circle')
  .attr('r', getRadius)
  .attr('fill', d => categoryColors[d.category] || '#666')
  .attr('stroke', d => {
    const c = d3.color(categoryColors[d.category] || '#666');
    return c ? c.brighter(0.8) : '#888';
  })
  .attr('opacity', 0.88);

// Labels always visible
nodeGroups.append('text')
  .attr('class', 'node-label')
  .attr('dy', d => getRadius(d) + 12)
  .text(d => d.name.length > 20 ? d.name.substring(0, 18) + '…' : d.name);

// Drag
const drag = d3.drag()
  .on('start', (e, d) => {
    if (!e.active) simulation.alphaTarget(0.15).restart();
    d.fx = d.x; d.fy = d.y;
  })
  .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
  .on('end', (e, d) => {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  });

nodeGroups.call(drag);

// Tooltip
const tooltip = d3.select('#tooltip');

function positionTooltip(e) {
  let x = e.clientX + 16, y = e.clientY + 16;
  const ttNode = document.getElementById('tooltip');
  const tw = ttNode.offsetWidth, th = ttNode.offsetHeight;
  if (x + tw > W - 10) x = e.clientX - tw - 16;
  if (y + th > H - 10) y = e.clientY - th - 16;
  tooltip.style('left', x + 'px').style('top', y + 'px');
}

// Highlight connected nodes on hover
nodeGroups.on('mouseenter', (e, d) => {
  const r = getRadius(d);
  d3.select(e.currentTarget).select('.node-circle').transition().duration(150).attr('r', r + 4);

  // Dim everything
  nodeGroups.attr('opacity', 0.12);
  linkEls.attr('opacity', 0.04);

  // Highlight connected
  const connectedIds = new Set([d.id]);
  links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) connectedIds.add(tid);
    if (tid === d.id) connectedIds.add(sid);
  });
  nodeGroups.filter(n => connectedIds.has(n.id)).attr('opacity', 1);
  linkEls.filter(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return sid === d.id || tid === d.id;
  }).attr('opacity', 0.85).attr('stroke-width', 3.5);

  tooltip.select('.tt-name').text(d.name);
  tooltip.select('.tt-meta').html(
    '<strong>Status:</strong> ' + d.status +
    (d.isSaint === 'Yes' ? '  ✦ Saint' : '') +
    '<br><strong>Location:</strong> ' + d.location +
    '<br><strong>Chapters:</strong> ' + d.chapters
  );
  tooltip.select('.tt-desc').text(d.description);
  tooltip.classed('visible', true);
  positionTooltip(e);
})
.on('mousemove', positionTooltip)
.on('mouseleave', (e, d) => {
  d3.select(e.currentTarget).select('.node-circle').transition().duration(150).attr('r', getRadius(d));
  nodeGroups.attr('opacity', 1);
  linkEls.attr('opacity', 0.4).attr('stroke-width', 2.5);
  tooltip.classed('visible', false);
});

linkEls.on('mouseenter', (e, d) => {
  d3.select(e.currentTarget).attr('opacity', 0.95).attr('stroke-width', 4.5);
  const s = typeof d.source === 'object' ? d.source : nodeById[d.source];
  const t = typeof d.target === 'object' ? d.target : nodeById[d.target];
  tooltip.select('.tt-name').text((s?.name || d.source) + '  ↔  ' + (t?.name || d.target));
  tooltip.select('.tt-meta').html('<span class="tt-badge" style="background:' + (connectionColors[d.type]||'#555') + '22;color:' + (connectionColors[d.type]||'#555') + '">' + d.type + '</span>');
  tooltip.select('.tt-desc').text(d.description);
  tooltip.classed('visible', true);
  positionTooltip(e);
})
.on('mousemove', positionTooltip)
.on('mouseleave', (e, d) => {
  d3.select(e.currentTarget).attr('opacity', 0.4).attr('stroke-width', 2.5);
  tooltip.classed('visible', false);
});

// Tick
simulation.on('tick', () => {
  linkEls
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  nodeGroups.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    nodeGroups.attr('opacity', 1);
    linkEls.attr('opacity', 0.4);
    return;
  }
  const matchIds = new Set();
  graphData.nodes.forEach(n => {
    if (n.name.toLowerCase().includes(q)) matchIds.add(n.id);
  });
  nodeGroups.attr('opacity', d => matchIds.has(d.id) ? 1 : 0.06);
  linkEls.attr('opacity', d => {
    const sid = typeof d.source === 'object' ? d.source.id : d.source;
    const tid = typeof d.target === 'object' ? d.target.id : d.target;
    return (matchIds.has(sid) || matchIds.has(tid)) ? 0.7 : 0.02;
  });
});

// Initial zoom
setTimeout(() => {
  svg.transition().duration(800).call(
    zoom.transform,
    d3.zoomIdentity.translate(W * 0.1, H * 0.1).scale(0.45)
  );
}, 100);

window.addEventListener('resize', () => {
  const nw = window.innerWidth, nh = window.innerHeight;
  svg.attr('width', nw).attr('height', nh);
});
</script>
</body>
</html>
