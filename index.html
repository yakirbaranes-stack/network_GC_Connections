  { source:"GCC-64",target:"GCC-86",desc:"Gregory's mother used a piece of rope from Silvester's bed to miraculously heal a feverish girl.",type:"Miracle" },
  { source:"GCC-67",target:"GCC-65",desc:"Ragnimodus was cured of a quartan fever after praying and sleeping at the tomb of Marcellus.",type:"Miracle" },
  { source:"GCC-68",target:"GCC-59",desc:"Germanus of Paris assisted in the physical elevation and translation of Ursinus' sarcophagus into the church at Bourges.",type:"Translation" },
  { source:"GCC-80",target:"GCC-86",desc:"Bishop Felix is a primary oral source for Gregory, specifically regarding the miracle of the lamb.",type:"Translation" },
  { source:"GCC-84",target:"GCC-86",desc:"Gregory personally attended Radegund's funeral, blessed her altar, and witnessed the possessed shouting.",type:"Miracle" },
];

const CONNECTION_COLORS={"Family/Ecclesiastical":"#C47A2B",Miracle:"#B83B5E",Translation:"#3B7DD8"};
const SAINT_COLOR="#D4A843", NON_SAINT_COLOR="#6AADCF";

const locGroups={};
CHARACTERS.forEach(c=>{if(!locGroups[c.location])locGroups[c.location]=[];locGroups[c.location].push(c.id);});

const CW=3000,CH=2200;
function cR(n){if(n>=10)return 260;if(n>=7)return 220;if(n>=4)return 170;if(n>=3)return 130;return 95;}

const CIRCLED={Tours:{cx:680,cy:720,r:cR(10)},Chinon:{cx:310,cy:900,r:cR(2)},Poitiers:{cx:460,cy:1200,r:cR(3)},Saintes:{cx:160,cy:1440,r:cR(3)},Limoges:{cx:700,cy:1540,r:cR(4)},Bourges:{cx:1100,cy:1050,r:cR(3)},Clermont:{cx:1280,cy:1560,r:cR(7)},Paris:{cx:1180,cy:300,r:cR(4)},Dijon:{cx:1920,cy:560,r:cR(4)},Autun:{cx:1740,cy:920,r:cR(3)},Chalon:{cx:1940,cy:1140,r:cR(2)},Lyon:{cx:1960,cy:1420,r:cR(3)}};

const SINGLES={Rennes:[120,360],"Le Mans":[500,440],Angers:[280,580],"Rezé":[100,680],Luynes:[540,500],Artonne:[1060,1340],"Orléans":[880,560],Auxerre:[1520,640],Soissons:[1180,100],Rheims:[1420,110],"Châlons":[1640,230],Troyes:[1640,430],Langres:[2080,380],Maastricht:[2220,80],Trier:[2420,160],"Déols":[880,840],"Évaux":[950,1270],Riom:[1100,1320],Issoire:[1300,1900],"Angoulême":[360,1600],Bordeaux:[140,1730],Blaye:[80,1600],"Périgueux":[520,1720],"Saint-Justin":[310,1900],Toulouse:[760,2040],Tarbes:[420,2100],Cieutat:[560,2120],"Saint-Lizier":[740,2160],Die:[1820,1660],Embrun:[2100,1740],Aix:[1920,1860],Nice:[2220,1800],Riez:[2080,1900],Vercelli:[2620,1060],Nola:[2740,1520],Antioch:[2860,2020]};

function locCenter(loc){if(CIRCLED[loc])return{x:CIRCLED[loc].cx,y:CIRCLED[loc].cy};if(SINGLES[loc])return{x:SINGLES[loc][0],y:SINGLES[loc][1]};return{x:CW/2,y:CH/2};}
const circledNames=Object.keys(CIRCLED);

function makeNR(links,sc){return d=>{const cc=links.filter(l=>l.source.id===d.id||l.target.id===d.id).length;return Math.max(6,4+cc*1.6)*sc;};}

function forceSameLocRepulsion(minDist){let nodes;function force(alpha){for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];if(a.location!==b.location)continue;let dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||1;if(dist<minDist){const push=(minDist-dist)/dist*alpha*0.8;a.x-=dx*push;a.y-=dy*push;b.x+=dx*push;b.y+=dy*push;}}}force.initialize=n=>{nodes=n;};return force;}

const tipEl=document.getElementById("tooltip");
const container=document.getElementById("container");
let simulation;

function build(){
  const W=container.clientWidth,H=container.clientHeight;
  const sx=W/CW,sy=H/CH,sc=Math.min(sx,sy);
  const cInfo={};
  circledNames.forEach(loc=>{const c=CIRCLED[loc];cInfo[loc]={cx:c.cx*sx,cy:c.cy*sy,r:c.r*sc};});

  const spreadLocs=new Set(["Tours","Clermont","Dijon","Limoges"]);

  function computeSpreadTargets(cx,cy,r,count){
    const targets=[],pad=r*0.15,usable=r-pad;
    if(count<=4){for(let i=0;i<count;i++){const a=(2*Math.PI*i)/count-Math.PI/2;targets.push({x:cx+usable*0.7*Math.cos(a),y:cy+usable*0.7*Math.sin(a)});}}
    else if(count<=7){const inner=2,outer=count-inner;for(let i=0;i<inner;i++){const a=(2*Math.PI*i)/inner-Math.PI/2;targets.push({x:cx+usable*0.32*Math.cos(a),y:cy+usable*0.32*Math.sin(a)});}for(let i=0;i<outer;i++){const a=(2*Math.PI*i)/outer-Math.PI/2+Math.PI/outer;targets.push({x:cx+usable*0.75*Math.cos(a),y:cy+usable*0.75*Math.sin(a)});}}
    else{const inner=3,outer=count-inner;for(let i=0;i<inner;i++){const a=(2*Math.PI*i)/inner-Math.PI/2;targets.push({x:cx+usable*0.35*Math.cos(a),y:cy+usable*0.35*Math.sin(a)});}for(let i=0;i<outer;i++){const a=(2*Math.PI*i)/outer-Math.PI/2+Math.PI/outer;targets.push({x:cx+usable*0.78*Math.cos(a),y:cy+usable*0.78*Math.sin(a)});}}
    return targets;
  }

  const spreadTargets={};
  spreadLocs.forEach(loc=>{const ci=cInfo[loc];if(!ci)return;spreadTargets[loc]=computeSpreadTargets(ci.cx,ci.cy,ci.r,locGroups[loc].length);});

  const locIdx={};
  const nodes=CHARACTERS.map(c=>{
    const ctr=locCenter(c.location),ci=cInfo[c.location];
    if(!locIdx[c.location])locIdx[c.location]=0;
    const idx=locIdx[c.location]++,total=locGroups[c.location].length;
    let startX,startY,tx,ty;
    if(spreadLocs.has(c.location)&&spreadTargets[c.location]){const t=spreadTargets[c.location][idx];startX=t.x;startY=t.y;tx=t.x;ty=t.y;}
    else if(ci&&total>2){const ringR=ci.r*0.75,angle=(2*Math.PI*idx)/total-Math.PI/2;startX=ci.cx+ringR*Math.cos(angle);startY=ci.cy+ringR*Math.sin(angle);tx=ci.cx;ty=ci.cy;}
    else if(ci){const off=idx===0?-ci.r*0.35:ci.r*0.35;startX=ci.cx+off;startY=ci.cy;tx=ci.cx;ty=ci.cy;}
    else{startX=ctr.x*sx;startY=ctr.y*sy;tx=startX;ty=startY;}
    return Object.assign({},c,{x:startX,y:startY,_cx:ci?ci.cx:ctr.x*sx,_cy:ci?ci.cy:ctr.y*sy,_r:ci?ci.r:null,_locIdx:idx,_locTotal:total,_tx:tx,_ty:ty});
  });

  const nmap={};nodes.forEach(n=>nmap[n.id]=n);
  const links=CONNECTIONS.filter(c=>nmap[c.source]&&nmap[c.target]).map(c=>Object.assign({},c,{source:nmap[c.source],target:nmap[c.target]}));
  const nR=makeNR(links,sc);
  const minSep=80*sc;

  const svg=d3.select("#graph").attr("width",W).attr("height",H);
  svg.selectAll("*").remove();
  const defs=svg.append("defs");

  const gl=defs.append("filter").attr("id","glow");gl.append("feGaussianBlur").attr("stdDeviation","2").attr("result","b");const fm=gl.append("feMerge");fm.append("feMergeNode").attr("in","b");fm.append("feMergeNode").attr("in","SourceGraphic");
  const gl2=defs.append("filter").attr("id","glowEdge");gl2.append("feGaussianBlur").attr("stdDeviation","3").attr("result","b2");const fm2=gl2.append("feMerge");fm2.append("feMergeNode").attr("in","b2");fm2.append("feMergeNode").attr("in","SourceGraphic");

  const bg=defs.append("radialGradient").attr("id","bg");bg.append("stop").attr("offset","0%").attr("stop-color","#2a2520");bg.append("stop").attr("offset","100%").attr("stop-color","#1a1612");
  svg.append("rect").attr("width",W).attr("height",H).attr("fill","url(#bg)");
  const pat=defs.append("pattern").attr("id","grid").attr("width",40).attr("height",40).attr("patternUnits","userSpaceOnUse");pat.append("path").attr("d","M 40 0 L 0 0 0 40").attr("fill","none").attr("stroke","#3a3228").attr("stroke-width",0.4);
  svg.append("rect").attr("width",W).attr("height",H).attr("fill","url(#grid)").attr("opacity",0.3);

  const g=svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.15,8]).on("zoom",e=>g.attr("transform",e.transform)));

  // Circles + watermark labels
  const cG=g.append("g");
  circledNames.forEach(loc=>{const ci=cInfo[loc];if(!ci)return;cG.append("circle").attr("cx",ci.cx).attr("cy",ci.cy).attr("r",ci.r).attr("fill","rgba(50,44,36,0.18)").attr("stroke","#6a5e4a").attr("stroke-width",1.4).attr("stroke-dasharray","8,5").attr("opacity",0.8);const fs=Math.max(11,Math.min(ci.r*0.24,26*sc));cG.append("text").attr("x",ci.cx).attr("y",ci.cy+fs*0.35).attr("text-anchor","middle").attr("fill","#c4956a").attr("opacity",0.65).attr("font-size",fs+"px").attr("font-family","'Palatino Linotype','Book Antiqua',Palatino,serif").attr("font-style","italic").attr("letter-spacing","3px").attr("pointer-events","none").text(loc.toUpperCase());});

  // Single labels
  const uG=g.append("g");
  Object.entries(SINGLES).forEach(([loc,pos])=>{if(!locGroups[loc]||!locGroups[loc].length)return;const fs=Math.max(7.5,9*sc);uG.append("text").attr("x",pos[0]*sx).attr("y",pos[1]*sy+24*sc).attr("text-anchor","middle").attr("fill","#c4956a").attr("font-size",fs+"px").attr("font-family","'Palatino Linotype','Book Antiqua',Palatino,serif").attr("font-style","italic").attr("letter-spacing","1px").attr("paint-order","stroke").attr("stroke","#1a1612").attr("stroke-width",2.5*sc).attr("stroke-linejoin","round").attr("pointer-events","none").text(loc);});

  // Links
  const lG=g.append("g");
  const lnk=lG.selectAll("line.v").data(links).enter().append("line").attr("stroke",d=>CONNECTION_COLORS[d.type]).attr("stroke-width",1.6*sc).attr("stroke-opacity",0.4);
  const lnkH=lG.selectAll("line.h").data(links).enter().append("line").attr("stroke","transparent").attr("stroke-width",16).attr("cursor","pointer");

  // Nodes
  const nG=g.append("g");
  let wasDragged=false;
  const nEls=nG.selectAll("g").data(nodes).enter().append("g").attr("cursor","grab").call(d3.drag().on("start",(ev,d)=>{wasDragged=false;if(!ev.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}).on("drag",(ev,d)=>{wasDragged=true;d.fx=ev.x;d.fy=ev.y;}).on("end",(ev,d)=>{if(!ev.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));

  nEls.append("circle").attr("r",nR).attr("fill",d=>d.saint?SAINT_COLOR:NON_SAINT_COLOR).attr("stroke",d=>d.saint?"#f0d890":"#9dd4ea").attr("stroke-width",1.5*sc).attr("filter","url(#glow)");

  const labelFS=Math.max(7,9*sc);
  nEls.append("text").text(d=>d.name).attr("dy",d=>{if(d._r&&d._locTotal>3)return d._locIdx%2===0?-(nR(d)+5*sc):(nR(d)+labelFS+2*sc);return-(nR(d)+5*sc);}).attr("text-anchor","middle").attr("fill","#e8dcc8").attr("font-size",labelFS+"px").attr("font-family","'Palatino Linotype','Book Antiqua',Palatino,serif").attr("font-weight","600").attr("paint-order","stroke").attr("stroke","#1a1612").attr("stroke-width",2.8*sc).attr("stroke-linejoin","round").attr("pointer-events","none");

  // Tooltip helper
  function showTip(mx,my,html){tipEl.innerHTML=html;tipEl.style.display="block";tipEl.style.left=Math.min(mx+14,W-310)+"px";tipEl.style.top=Math.max(10,Math.min(my-10,H-230))+"px";}
  function hideTip(){tipEl.style.display="none";}

  function nodeTipHTML(d){
    const col=d.saint?SAINT_COLOR:NON_SAINT_COLOR;
    const icon=d.saint?"⛪ Saint":"✦ Not a Saint";
    return '<div class="tip-name" style="color:'+col+'">'+d.name+'</div><div class="tip-title">'+d.title+'</div><div class="tip-meta">'+icon+' · '+d.location+'</div><div class="tip-desc">'+d.desc+'</div><div class="tip-ch">Chapters: '+d.chapters+'</div>';
  }
  function linkTipHTML(d){
    const col=CONNECTION_COLORS[d.type];
    return '<div class="tip-type-row"><div class="leg-line" style="width:24px;background:'+col+'"></div><span class="tip-type-label" style="color:'+col+'">'+d.type+'</span></div><div class="tip-link-names">'+d.source.name+' ↔ '+d.target.name+'</div><div class="tip-link-desc">'+d.desc+'</div>';
  }

  // Interaction
  let pinnedId=null;

  function applyHighlight(nodeId){
    const connIds=new Set([nodeId]);
    links.forEach(l=>{if(l.source.id===nodeId)connIds.add(l.target.id);if(l.target.id===nodeId)connIds.add(l.source.id);});
    lnk.each(function(l){const hit=l.source.id===nodeId||l.target.id===nodeId;d3.select(this).transition().duration(150).attr("stroke-opacity",hit?1:0.06).attr("stroke-width",hit?3.5*sc:0.8*sc).attr("filter",hit?"url(#glowEdge)":"none");});
    nEls.each(function(n){const on=connIds.has(n.id);d3.select(this).select("circle").transition().duration(150).attr("opacity",on?1:0.15).attr("stroke-width",n.id===nodeId?4*sc:1.5*sc);d3.select(this).select("text").transition().duration(150).attr("opacity",on?1:0.1);});
  }
  function clearHighlight(){
    lnk.transition().duration(200).attr("stroke-opacity",0.4).attr("stroke-width",1.6*sc).attr("filter","none");
    nEls.each(function(){d3.select(this).select("circle").transition().duration(200).attr("opacity",1).attr("stroke-width",1.5*sc);d3.select(this).select("text").transition().duration(200).attr("opacity",1);});
  }

  nEls.on("click",(ev,d)=>{ev.stopPropagation();if(wasDragged)return;if(pinnedId===d.id){pinnedId=null;clearHighlight();}else{pinnedId=d.id;applyHighlight(d.id);}});
  svg.on("click",()=>{if(pinnedId){pinnedId=null;clearHighlight();}});

  nEls.on("mouseenter",(ev,d)=>{const [mx,my]=d3.pointer(ev,container);showTip(mx,my,nodeTipHTML(d));if(!pinnedId)applyHighlight(d.id);}).on("mouseleave",()=>{hideTip();if(!pinnedId)clearHighlight();});

  lnkH.on("click",ev=>ev.stopPropagation()).on("mouseenter",(ev,d)=>{const [mx,my]=d3.pointer(ev,container);showTip(mx,my,linkTipHTML(d));if(!pinnedId)lnk.filter(l=>l===d).attr("stroke-opacity",1).attr("stroke-width",3.5*sc).attr("filter","url(#glowEdge)");}).on("mouseleave",(ev,d)=>{hideTip();if(!pinnedId)lnk.filter(l=>l===d).attr("stroke-opacity",0.4).attr("stroke-width",1.6*sc).attr("filter","none");});

  // Simulation
  simulation=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(55*sc).strength(0.1))
    .force("charge",d3.forceManyBody().strength(-30*sc))
    .force("collision",d3.forceCollide().radius(d=>nR(d)+28*sc).strength(1).iterations(4))
    .force("sameLocRepel",forceSameLocRepulsion(minSep))
    .force("x",d3.forceX(d=>d._tx).strength(d=>spreadLocs.has(d.location)?0.7:0.45))
    .force("y",d3.forceY(d=>d._ty).strength(d=>spreadLocs.has(d.location)?0.7:0.45));

  simulation.on("tick",()=>{
    nodes.forEach(d=>{if(!d._r)return;const dx=d.x-d._cx,dy=d.y-d._cy,dist=Math.sqrt(dx*dx+dy*dy),maxR=d._r-nR(d)-8*sc;if(maxR>0&&dist>maxR){const r=maxR/dist;d.x=d._cx+dx*r;d.y=d._cy+dy*r;}});
    lnk.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    lnkH.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    nEls.attr("transform",d=>"translate("+d.x+","+d.y+")");
  });
  simulation.alpha(1).restart();
}

build();
window.addEventListener("resize",()=>{if(simulation)simulation.stop();build();});
</script>
</body>
</html>
