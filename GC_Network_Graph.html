const locationMap = {};
characters.forEach(c => { if (!locationMap[c.location]) locationMap[c.location] = []; locationMap[c.location].push(c); });

function getLocationRadius(loc) {
  const count = locationMap[loc].length;
  if (loc === "Tours") return 170;
  if (loc === "Clermont") return 140;
  if (count <= 1) return 32;
  if (count <= 2) return 48;
  if (count <= 3) return 62;
  if (count <= 4) return 78;
  if (count <= 5) return 88;
  return 70 + count * 10;
}

function distributeNodes(chars, cx, cy, radius) {
  const n = chars.length;
  if (n === 1) { chars[0].x = cx; chars[0].y = cy; return; }
  const minSep = 36;
  if (n <= 6) {
    const ringR = Math.min(radius * 0.55, radius - 18);
    chars.forEach((c, i) => {
      const angle = (2 * Math.PI * i) / n - Math.PI / 2;
      c.x = cx + ringR * Math.cos(angle);
      c.y = cy + ringR * Math.sin(angle);
    });
  } else {
    const innerCount = Math.max(1, Math.floor(n / 3));
    const outerCount = n - innerCount;
    const outerR = radius - 18;
    const innerRing = outerR * 0.45;
    chars.slice(0, innerCount).forEach((c, i) => {
      const angle = (2 * Math.PI * i) / innerCount - Math.PI / 2;
      c.x = cx + innerRing * Math.cos(angle);
      c.y = cy + innerRing * Math.sin(angle);
    });
    chars.slice(innerCount).forEach((c, i) => {
      const angle = (2 * Math.PI * i) / outerCount - Math.PI / 2;
      c.x = cx + outerR * Math.cos(angle);
      c.y = cy + outerR * Math.sin(angle);
    });
  }
  for (let iter = 0; iter < 60; iter++) {
    let moved = false;
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const dx = chars[j].x - chars[i].x, dy = chars[j].y - chars[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minSep && dist > 0) {
          const o = (minSep - dist) / 2;
          const ux = dx / dist, uy = dy / dist;
          chars[i].x -= ux * o; chars[i].y -= uy * o;
          chars[j].x += ux * o; chars[j].y += uy * o;
          moved = true;
        }
      }
    }
    chars.forEach(c => {
      const dx = c.x - cx, dy = c.y - cy, d = Math.sqrt(dx * dx + dy * dy);
      const maxR = radius - 14;
      if (d > maxR) { c.x = cx + (dx / d) * maxR; c.y = cy + (dy / d) * maxR; }
    });
    if (!moved) break;
  }
}

Object.keys(locationMap).forEach(loc => {
  const geo = locationGeo[loc];
  if (!geo) return;
  distributeNodes(locationMap[loc], geo.x, geo.y, getLocationRadius(loc));

const charById = {};
characters.forEach(c => charById[c.id] = c);

const saintColor = "#c9a96e", nonSaintColor = "#6a8caf";
const connColors = { "family/ecclesiastical": "#b08040", "translation": "#d4a0d4", "miracle": "#50b8a0" };

const svg = d3.select("#graph");
const tooltip = d3.select("#tooltip");
const g = svg.append("g");

const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", (e) => g.attr("transform", e.transform));

const initTransform = d3.zoomIdentity.translate(10, 10).scale(0.62);
svg.call(zoom.transform, initTransform);

let selectedNodeId = null;

const locData = Object.keys(locationMap).map(loc => ({
  loc, x: locationGeo[loc]?.x || 0, y: locationGeo[loc]?.y || 0,
  r: getLocationRadius(loc), count: locationMap[loc].length
}));

const locGroups = g.selectAll(".loc-group").data(locData).enter().append("g");

locGroups.each(function(d) {
  const el = d3.select(this);
  if (d.count > 3) {
    el.append("circle").attr("cx", d.x).attr("cy", d.y).attr("r", d.r)
      .attr("fill", "rgba(201,169,110,0.08)")

  } else if (d.count > 1) {
    el.append("circle").attr("cx", d.x).attr("cy", d.y).attr("r", d.r)

      .attr("stroke", "rgba(240,200,80,0.4)").attr("stroke-width", 1.4).attr("stroke-dasharray", "5,3");
  } else if (d.count === 1) {
    el.append("circle").attr("cx", d.x).attr("cy", d.y).attr("r", d.r)

      .attr("stroke", "rgba(240,200,80,0.25)").attr("stroke-width", 1).attr("stroke-dasharray", "4,3");

  el.append("text").attr("x", d.x).attr("y", labelY).attr("text-anchor", "middle")

    .attr("font-weight", "700").attr("letter-spacing", "1.5px")
    .attr("paint-order", "stroke").attr("stroke", "#0a0a10").attr("stroke-width", 3).attr("stroke-linejoin", "round")

// Edges
const edgeGroup = g.append("g");
const edgeElements = edgeGroup.selectAll("line").data(connections).enter().append("line")
  .attr("x1", d => charById[d.source]?.x || 0).attr("y1", d => charById[d.source]?.y || 0)
  .attr("x2", d => charById[d.target]?.x || 0).attr("y2", d => charById[d.target]?.y || 0)
  .attr("stroke", d => connColors[d.type] || "#666")
  .attr("stroke-width", 1.2).attr("stroke-opacity", 0.3).attr("cursor", "pointer")
  .on("mouseenter", function(event, d) {
    if (!selectedNodeId) d3.select(this).attr("stroke-opacity", 0.9).attr("stroke-width", 2.5);
    else d3.select(this).attr("stroke-width", 2.5);
    showEdgeTooltip(event, d);
  })
  .on("mousemove", (event) => moveTooltip(event))
  .on("mouseleave", function(event, d) {
    if (!selectedNodeId) { d3.select(this).attr("stroke-opacity", 0.3).attr("stroke-width", 1.2); }
    else {
      const sel = d.source === selectedNodeId || d.target === selectedNodeId;
      d3.select(this).attr("stroke-opacity", sel ? 0.9 : 0.06).attr("stroke-width", sel ? 2.5 : 1.2);
    }
    hideTooltip();
  });

// Nodes
const nodeGroup = g.append("g");
const nodeElements = nodeGroup.selectAll("g").data(characters).enter().append("g")
  .attr("transform", d => `translate(${d.x},${d.y})`).attr("cursor", "pointer")
  .on("mouseenter", function(event, d) { showNodeTooltip(event, d); if (!selectedNodeId) highlightConnections(d.id); })
  .on("mousemove", (event) => moveTooltip(event))
  .on("mouseleave", function() { hideTooltip(); if (!selectedNodeId) clearHighlight(); })
  .on("click", function(event, d) {
    event.stopPropagation();
    if (selectedNodeId === d.id) { selectedNodeId = null; clearHighlight(); }
    else { selectedNodeId = d.id; highlightConnections(d.id); }
  });

svg.on("click", function() { if (selectedNodeId) { selectedNodeId = null; clearHighlight(); } });

function highlightConnections(nodeId) {
  const connected = new Set([nodeId]);
  connections.forEach(c => { if (c.source === nodeId) connected.add(c.target); if (c.target === nodeId) connected.add(c.source); });
  edgeElements.attr("stroke-opacity", d => (d.source === nodeId || d.target === nodeId) ? 0.9 : 0.05)
    .attr("stroke-width", d => (d.source === nodeId || d.target === nodeId) ? 2.5 : 1.2);
  nodeElements.selectAll("circle").attr("opacity", d => connected.has(d.id) ? 1 : 0.12);
  nodeElements.selectAll("text").attr("opacity", d => connected.has(d.id) ? 1 : 0.12);
}
function clearHighlight() {
  edgeElements.attr("stroke-opacity", 0.3).attr("stroke-width", 1.2);
  nodeElements.selectAll("circle").attr("opacity", 0.92);
  nodeElements.selectAll("text").attr("opacity", 1);
}

function showNodeTooltip(event, d) {
  const badge = d.saint === "Saint" ? '<span style="color:#c9a96e;font-weight:600">\u2726 Saint</span>' : '<span style="color:#6a8caf">Non-Saint</span>';
  tooltip.html(`<div class="tt-name">${d.name}</div><div class="tt-status">${d.status} &middot; ${badge}</div><div class="tt-loc">\u25C9 ${d.location} &mdash; Ch. ${d.chapters}</div><div class="tt-desc">${d.desc}</div>`);
  tooltip.classed("visible", true); moveTooltip(event);
}
function showEdgeTooltip(event, d) {
  const c1 = charById[d.source], c2 = charById[d.target];
  const label = d.type.replace("/", " / ").replace(/\b\w/g, l => l.toUpperCase());
  const color = connColors[d.type] || "#888";
  tooltip.html(`<div class="tt-name">${c1?.name} \u2194 ${c2?.name}</div><div class="tt-conn-type" style="background:${color}33;color:${color};border:1px solid ${color}66">${label}</div><div class="tt-desc">${d.desc}</div>`);
  tooltip.classed("visible", true); moveTooltip(event);
}
function moveTooltip(event) {
  const t = tooltip.node(); let left = event.clientX + 14, top = event.clientY - 8;
  if (left + t.offsetWidth > window.innerWidth - 10) left = event.clientX - t.offsetWidth - 14;
  if (top + t.offsetHeight > window.innerHeight - 10) top = window.innerHeight - t.offsetHeight - 10;
  if (top < 6) top = 6;
  tooltip.style("left", left + "px").style("top", top + "px");
}
function hideTooltip() { tooltip.classed("visible", false); }

d3.select("#zoom-in").on("click", () => svg.transition().duration(300).call(zoom.scaleBy, 1.4));
d3.select("#zoom-out").on("click", () => svg.transition().duration(300).call(zoom.scaleBy, 0.7));
d3.select("#zoom-reset").on("click", () => svg.transition().duration(500).call(zoom.transform, initTransform));
